{% extends 'base.html' %}
{% block title %}Mark Attendance - PIA Intern Management System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="pia-page-title"><i class="bi bi-calendar-plus me-2"></i>Mark Attendance</h3>
    <a href="{{ url_for('attendance.list_attendance') }}" class="btn btn-outline-secondary">
        <i class="bi bi-list-ul me-1"></i> View Records
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card pia-card shadow-sm">
            <div class="card-body p-4">
                {% if not interns %}
                <div class="text-center text-muted py-4">
                    <i class="bi bi-exclamation-circle display-6 d-block mb-2"></i>
                    No active interns are currently available.
                </div>
                {% else %}
                <form method="POST" novalidate>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Intern <span class="text-danger">*</span></label>
                            <select class="form-select" name="intern_id" required>
                                <option value="" disabled selected>Select intern</option>
                                {% for intern in interns %}
                                <option value="{{ intern.id }}"
                                    {{ 'selected' if form and form.get('intern_id')|string == intern.id|string }}>
                                    {{ intern.full_name }} &mdash; {{ intern.department.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="date" required
                                   value="{{ form.get('date') if form else '' }}">
                        </div>
                        <div class="col-md-6" id="timeFieldWrap">
                            <label class="form-label">Clock In Time <span class="text-danger" id="timeRequiredMark">*</span></label>
                            <input type="time" class="form-control" name="time" id="timeField"
                                   value="{{ form.get('time') if form else '' }}">
                            <div class="form-text" id="timeHelpText">Not required for Absent/Leave.</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Status <span class="text-danger">*</span></label>
                            <select class="form-select" name="status" id="statusField" required>
                                {% for s in statuses %}
                                <option value="{{ s }}" {{ 'selected' if form and form.get('status') == s }}>{{ s }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Remarks</label>
                            <input type="text" class="form-control" name="remarks" maxlength="255"
                                   placeholder="Optional note"
                                   value="{{ form.get('remarks') if form else '' }}">
                        </div>
                    </div>

                    <button type="submit" class="btn pia-btn-primary mt-4">
                        <i class="bi bi-check-circle me-1"></i> Save Attendance
                    </button>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
</div>
<script>
    (function () {
        var statusField = document.getElementById('statusField');
        var timeField = document.getElementById('timeField');
        var timeRequiredMark = document.getElementById('timeRequiredMark');
        var timeFieldWrap = document.getElementById('timeFieldWrap');
        if (!statusField || !timeField) return;

        function syncTimeRequirement() {
            var noTimeStatuses = ['Absent', 'Leave'];
            var required = noTimeStatuses.indexOf(statusField.value) === -1;
            timeField.required = required;
            timeField.disabled = !required;
            if (!required) {
                timeField.value = '';
            }
            timeRequiredMark.style.display = required ? '' : 'none';
            timeFieldWrap.classList.toggle('opacity-50', !required);
        }

        statusField.addEventListener('change', syncTimeRequirement);
        syncTimeRequirement();
    })();
</script>
{% endblock %}
