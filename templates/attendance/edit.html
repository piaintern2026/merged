{% extends 'base.html' %}
{% block title %}Edit Attendance - PIA Intern Management System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="pia-page-title"><i class="bi bi-pencil-square me-2"></i>Edit Attendance</h3>
    <a href="{{ url_for('attendance.list_attendance') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back to List
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card pia-card shadow-sm">
            <div class="card-body p-4">
                <p class="mb-1"><strong>Intern:</strong> {{ record.intern.full_name }}</p>
                <p class="text-muted mb-4"><strong>Date:</strong> {{ record.date.strftime('%d %b %Y') }} (fixed)</p>

                <form method="POST" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6" id="timeFieldWrap">
                            <label class="form-label">Clock In Time <span class="text-danger" id="timeRequiredMark">*</span></label>
                            <input type="time" class="form-control" name="time" id="timeField"
                                   value="{{ record.time.strftime('%H:%M') if record.time else '' }}">
                            <div class="form-text">Not required for Absent/Leave.</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Clock Out Time</label>
                            <input type="time" class="form-control" name="time_out" id="timeOutField"
                                   value="{{ record.time_out.strftime('%H:%M') if record.time_out else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Status <span class="text-danger">*</span></label>
                            <select class="form-select" name="status" id="statusField" required>
                                {% for s in statuses %}
                                <option value="{{ s }}" {{ 'selected' if record.status == s }}>{{ s }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Remarks</label>
                            <input type="text" class="form-control" name="remarks" maxlength="255"
                                   value="{{ record.remarks or '' }}">
                        </div>
                    </div>
                    <button type="submit" class="btn pia-btn-primary mt-4">
                        <i class="bi bi-check-circle me-1"></i> Update Attendance
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    (function () {
        var statusField = document.getElementById('statusField');
        var timeField = document.getElementById('timeField');
        var timeOutField = document.getElementById('timeOutField');
        var timeRequiredMark = document.getElementById('timeRequiredMark');
        var timeFieldWrap = document.getElementById('timeFieldWrap');
        if (!statusField || !timeField) return;

        function syncTimeRequirement() {
            var noTimeStatuses = ['Absent', 'Leave'];
            var required = noTimeStatuses.indexOf(statusField.value) === -1;
            timeField.required = required;
            timeField.disabled = !required;
            timeOutField.disabled = !required;
            if (!required) {
                timeField.value = '';
                timeOutField.value = '';
            }
            timeRequiredMark.style.display = required ? '' : 'none';
            timeFieldWrap.classList.toggle('opacity-50', !required);
        }

        statusField.addEventListener('change', syncTimeRequirement);
        syncTimeRequirement();
    })();
</script>
{% endblock %}
