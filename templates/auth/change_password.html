{% extends 'base.html' %}
{% block title %}Change Password - PIA Intern Management System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="pia-page-title"><i class="bi bi-key-fill me-2"></i>Change Password</h3>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card pia-card shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.change_password') }}" novalidate>
                    <div class="mb-3">
                        <label for="current_password" class="form-label">Current Password</label>
                        <input type="password" class="form-control" id="current_password"
                               name="current_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="new_password"
                               name="new_password" minlength="8" required>
                        <div class="form-text">Minimum 8 characters.</div>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" minlength="8" required>
                    </div>
                    <button type="submit" class="btn pia-btn-primary">
                        <i class="bi bi-check-circle me-1"></i> Update Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
