{% extends 'base.html' %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="text-center py-5">
    <h1 class="display-1 fw-bold text-danger">500</h1>
    <p class="fs-4">Something went wrong on our end. Please try again.</p>
    <a href="{{ url_for('dashboard.index') }}" class="btn pia-btn-primary mt-3">
        <i class="bi bi-house-door me-1"></i> Back to Dashboard
    </a>
</div>
{% endblock %}
{% block auth_content %}
<div class="text-center py-5">
    <h1 class="display-1 fw-bold text-danger">500</h1>
    <p class="fs-4">Something went wrong on our end. Please try again.</p>
    <a href="{{ url_for('auth.login') }}" class="btn pia-btn-primary mt-3">Back to Login</a>
</div>
{% endblock %}
